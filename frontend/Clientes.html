<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Hoteles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h3>Nuestro Sistema de Hoteles - Clientes</h3>

    <!-- MENSAJES -->
    <div id="mensaje"></div>

    <!-- FORMULARIO -->
    <div class="card p-3 my-3">
        <h5>Crear cliente</h5>

        <input id="username" class="form-control mb-2" placeholder="Username">
        <input id="email" class="form-control mb-2" placeholder="Email">

        <button class="btn btn-success" onclick="crearCliente()">
            + Crear cliente
        </button>
    </div>

    <!-- TABLA -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Acción</th>
            </tr>
        </thead>

        <tbody id="tablaclientes"></tbody>
    </table>

    <script src="funciones/sistemadehotel.js"></script>
</body>
</html>
